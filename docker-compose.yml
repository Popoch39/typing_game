services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: typing_game
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/typing_game
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me}
      BETTER_AUTH_URL: http://localhost:3001
      FRONTEND_URL: http://localhost:3000
      PORT: 3001
    volumes:
      - ./apps/api/src:/app/src
      - ./packages/database/src:/app/node_modules/@repo/database/src
    depends_on:
      postgres:
        condition: service_healthy

  ws:
    build:
      context: .
      dockerfile: apps/ws/Dockerfile
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/typing_game
      PORT: 3002
    volumes:
      - ./apps/ws/src:/app/src
      - ./packages/database/src:/app/node_modules/@repo/database/src
      - ./packages/shared/src:/app/node_modules/@repo/shared/src
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_INTERNAL_URL: http://api:3001
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/next.config.ts:/app/next.config.ts
      - ./apps/frontend/components.json:/app/components.json
      - ./packages/shared/src:/app/node_modules/@repo/shared/src
    depends_on:
      - api
      - ws

volumes:
  pgdata:
